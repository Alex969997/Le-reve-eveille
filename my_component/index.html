<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Streamlit Timing QTE Slider</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: #e2e8f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 160px;
            overflow: hidden;
        }
        .bar-container {
            position: relative;
            width: 90%;
            height: 30px;
            background-color: #ef4444; /* Rouge Zone */
            border-radius: 6px;
            border: 2px solid #334155;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .zone {
            position: absolute;
            height: 100%;
        }
        .zone-orange {
            left: 25%;
            width: 50%;
            background-color: #f59e0b; /* Orange Zone */
        }
        .zone-green-light {
            left: 40%;
            width: 20%;
            background-color: #10b981; /* Vert Clair Zone */
        }
        .zone-target {
            left: 47%;
            width: 6%;
            background-color: #22c55e; /* Vert Foncé Target */
            border-left: 2px dashed #ffffff;
            border-right: 2px dashed #ffffff;
            box-shadow: 0 0 10px #22c55e;
        }
        .cursor {
            position: absolute;
            width: 12px;
            height: 100%;
            background-color: #ffffff;
            box-shadow: 0 0 15px #ffffff, 0 0 5px #ffffff;
            left: 0%;
            top: 0;
            transform: translateX(-50%);
            z-index: 10;
        }
        button {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3) 0%, rgba(168, 85, 247, 0.3) 100%);
            color: #f3e8ff;
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 10px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 30px;
            cursor: pointer;
            transition: all 0.2s;
            width: 90%;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.15);
        }
        button:hover {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.5) 0%, rgba(168, 85, 247, 0.5) 100%);
            border: 1px solid rgba(192, 132, 252, 0.8);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
            color: #ffffff;
        }
        
        /* Cécité / Voile Onirique (Grey out colors) */
        body.blind {
            background-color: #030712;
        }
        body.blind .bar-container {
            background-color: #1f2937; /* Gris sombre uniforme */
            border-color: #4b5563;
        }
        body.blind .zone-orange {
            background-color: #1f2937;
        }
        body.blind .zone-green-light {
            background-color: #1f2937;
        }
        body.blind .zone-target {
            background-color: #1f2937;
            border-left: none;
            border-right: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="bar-container">
        <div class="zone zone-orange"></div>
        <div class="zone zone-green-light"></div>
        <div class="zone zone-target"></div>
        <div id="cursor" class="cursor"></div>
    </div>
    
    <button id="stop-btn">💥 CONFIRMER L'IMPACT</button>

    <script>
        let position = 0;
        let direction = 1;
        let speed = 2.4; // Default speed
        let isRunning = true;
        let action = "attack"; // Default value
        let distortion = false; // Default value
        let jitter = false; // Target shaking
        let instability = false; // Unstable random speed variations
        let frameCount = 0;
        
        let targetCenter = 50;
        let targetWidth = 6;
        
        const cursor = document.getElementById('cursor');
        const stopBtn = document.getElementById('stop-btn');
        
        function updateZones(offset = 0) {
            const currentCenter = targetCenter + offset;
            
            // Update Target Zone
            const zoneTarget = document.querySelector('.zone-target');
            const targetLeft = currentCenter - (targetWidth / 2);
            zoneTarget.style.left = targetLeft + '%';
            zoneTarget.style.width = targetWidth + '%';
            
            // Update Green Light Zone
            const zoneGreenLight = document.querySelector('.zone-green-light');
            const greenWidth = targetWidth * 3.3; // standard ratio (20/6 approx 3.3)
            const greenLeft = currentCenter - (greenWidth / 2);
            zoneGreenLight.style.left = Math.max(0, greenLeft) + '%';
            zoneGreenLight.style.width = Math.min(100 - Math.max(0, greenLeft), greenWidth) + '%';
            
            // Update Orange Zone
            const zoneOrange = document.querySelector('.zone-orange');
            const orangeWidth = targetWidth * 8.3; // standard ratio (50/6 approx 8.3)
            const orangeLeft = currentCenter - (orangeWidth / 2);
            zoneOrange.style.left = Math.max(0, orangeLeft) + '%';
            zoneOrange.style.width = Math.min(100 - Math.max(0, orangeLeft), orangeWidth) + '%';
        }
        
        // Bouncing cursor animation loop at 60fps
        function animate() {
            if (!isRunning) return;
            
            frameCount++;
            let currentSpeed = speed;
            if (distortion) {
                // Wave speed variation effect: slower at the center, faster at the edges
                const angle = (position / 100) * Math.PI;
                currentSpeed = speed * (0.35 + 1.35 * Math.sin(angle));
            }
            if (instability) {
                // Instability effect: speed varies randomly every 15 frames
                const phase = Math.floor(frameCount / 15);
                // Pseudo-random multiplier between 0.3 and 2.2 based on phase
                const randMultiplier = 0.3 + 1.9 * (Math.abs(Math.sin(phase * 997)) % 1.0);
                currentSpeed = currentSpeed * randMultiplier;
            }
            
            position += currentSpeed * direction;
            if (position >= 100) {
                position = 100;
                direction = -1;
            } else if (position <= 0) {
                position = 0;
                direction = 1;
            }
            cursor.style.left = position + '%';
            
            // Handle Jitter effect on target zones rendering
            if (jitter) {
                // Oscillating shake of ±4%
                const offset = Math.sin(frameCount * 0.8) * 4;
                updateZones(offset);
            }
            
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        // Helper function to send messages to Streamlit parent
        function sendToStreamlit(type, payload) {
            const msg = Object.assign({
                isStreamlitMessage: true,
                type: type
            }, payload);
            window.parent.postMessage(msg, "*");
        }

        // Streamlit listener for data updates sent from Python
        window.addEventListener("message", (event) => {
            console.log("IFRAME RECEIVED MESSAGE:", JSON.stringify(event.data));
            const data = event.data;
            if (data && data.type === "streamlit:render") {
                // Save arguments passed from Python
                if (data.args) {
                    if (data.args.action) {
                        action = data.args.action;
                    }
                    if (data.args.speed) {
                        speed = data.args.speed;
                    }
                    if (data.args.distortion !== undefined) {
                        distortion = data.args.distortion;
                    }
                    if (data.args.jitter !== undefined) {
                        jitter = data.args.jitter;
                    }
                    if (data.args.instability !== undefined) {
                        instability = data.args.instability;
                    }
                    
                    // Handle blindness mode class
                    if (data.args.blind) {
                        document.body.classList.add('blind');
                    } else {
                        document.body.classList.remove('blind');
                    }
                    
                    // Handle dynamic zones resizing and shifting
                    targetWidth = data.args.target_width || 6;
                    targetCenter = data.args.target_center || 50;
                    updateZones(0);
                }
                
                // Inform Streamlit of height requirements
                sendToStreamlit("streamlit:setFrameHeight", { height: 185 });
            }
        });

        // Inform Streamlit that the component is loaded and ready
        sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
        // Set initial frame height to 185px
        sendToStreamlit("streamlit:setFrameHeight", { height: 185 });

        // Handle impact stop click
        stopBtn.addEventListener('click', () => {
            if (!isRunning) return;
            isRunning = false;
            stopBtn.disabled = true;
            
            // Send final values back to Streamlit/Python
            sendToStreamlit("streamlit:setComponentValue", {
                value: {
                    position: Math.round(position),
                    action: action
                }
            });
        });
    </script>
</body>
</html>
