<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Streamlit Timing QTE Slider</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 160px;
            overflow: hidden;
        }
        .bar-container {
            position: relative;
            width: 90%;
            height: 30px;
            background-color: #ef4444; /* Rouge Zone */
            border-radius: 6px;
            border: 2px solid #334155;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .zone {
            position: absolute;
            height: 100%;
        }
        .zone-orange {
            left: 25%;
            width: 50%;
            background-color: #f59e0b; /* Orange Zone */
        }
        .zone-green-light {
            left: 40%;
            width: 20%;
            background-color: #10b981; /* Vert Clair Zone */
        }
        .zone-target {
            left: 47%;
            width: 6%;
            background-color: #22c55e; /* Vert Foncé Target */
            border-left: 2px dashed #ffffff;
            border-right: 2px dashed #ffffff;
            box-shadow: 0 0 10px #22c55e;
        }
        .cursor {
            position: absolute;
            width: 12px;
            height: 100%;
            background-color: #ffffff;
            box-shadow: 0 0 15px #ffffff, 0 0 5px #ffffff;
            left: 0%;
            top: 0;
            transform: translateX(-50%);
            z-index: 10;
        }
        button {
            background-color: #1e1b4b;
            color: #a5b4fc;
            border: 2px solid #4f46e5;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 30px;
            cursor: pointer;
            transition: all 0.2s;
            width: 90%;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.3);
        }
        button:hover {
            background-color: #4f46e5;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.6);
        }
    </style>
</head>
<body>
    <div class="bar-container">
        <div class="zone zone-orange"></div>
        <div class="zone zone-green-light"></div>
        <div class="zone zone-target"></div>
        <div id="cursor" class="cursor"></div>
    </div>
    
    <button id="stop-btn">💥 CONFIRMER L'IMPACT</button>

    <script>
        let position = 0;
        let direction = 1;
        let speed = 2.4; // Oscillation speed
        let isRunning = true;
        let action = "attack"; // Default value
        
        const cursor = document.getElementById('cursor');
        const stopBtn = document.getElementById('stop-btn');
        
        // Bouncing cursor animation loop at 60fps
        function animate() {
            if (!isRunning) return;
            position += speed * direction;
            if (position >= 100) {
                position = 100;
                direction = -1;
            } else if (position <= 0) {
                position = 0;
                direction = 1;
            }
            cursor.style.left = position + '%';
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        // Helper function to send messages to Streamlit parent
        function sendToStreamlit(type, payload) {
            const msg = Object.assign({
                isStreamlitMessage: true,
                type: type
            }, payload);
            window.parent.postMessage(msg, "*");
        }

        // Streamlit listener for data updates sent from Python
        window.addEventListener("message", (event) => {
            const data = event.data;
            if (data && data.isStreamlitMessage && data.type === "streamlit:render") {
                // Save action argument passed from Python
                if (data.args && data.args.action) {
                    action = data.args.action;
                }
                // Inform Streamlit of height requirements
                sendToStreamlit("streamlit:setFrameHeight", { height: 185 });
            }
        });

        // Inform Streamlit that the component is loaded and ready
        sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });

        // Handle impact stop click
        stopBtn.addEventListener('click', () => {
            if (!isRunning) return;
            isRunning = false;
            stopBtn.disabled = true;
            
            // Send final values back to Streamlit/Python
            sendToStreamlit("streamlit:setComponentValue", {
                value: {
                    position: Math.round(position),
                    action: action
                }
            });
        });
    </script>
</body>
</html>
